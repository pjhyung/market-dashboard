
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Korea Market Command — 2026년 3월</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0F172A; --card: #1E293B; --border: #334155;
    --text: #F1F5F9; --muted: #64748B; --sub: #94A3B8;
    --up: #22C55E; --down: #EF4444;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; min-height: 100vh; }
  header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 24px 40px; border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, #0F172A 0%, #1a1f35 100%);
  }
  .logo { font-size: 20px; font-weight: 700; letter-spacing: 2px; }
  .logo span { color: #60A5FA; }
  .nav-month { display: flex; align-items: center; gap: 20px; }
  .nav-month button {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 16px;
    transition: background 0.2s;
  }
  .nav-month button:hover { background: #2D3748; }
  .month-label { font-size: 22px; font-weight: 600; min-width: 160px; text-align: center; }
  .last-updated { color: var(--sub); font-size: 13px; }
  .calendar-wrap { padding: 32px 40px; }
  .weekday-header {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 4px; margin-bottom: 4px;
  }
  .weekday-header div {
    text-align: center; font-size: 12px; font-weight: 600;
    color: var(--muted); padding: 8px 0; letter-spacing: 1px;
  }
  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .day-cell {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 12px; min-height: 110px;
    transition: transform 0.15s, border-color 0.15s;
  }
  .day-cell.has-data { cursor: pointer; border-color: #3D4F6B; }
  .day-cell.has-data:hover {
    transform: translateY(-2px); border-color: #60A5FA;
    box-shadow: 0 4px 20px rgba(96,165,250,0.15);
  }
  .day-cell.empty { background: transparent; border-color: transparent; min-height: 110px; }
  .day-cell.today { border-color: #60A5FA; }
  .day-cell.today .day-num { color: #60A5FA; font-weight: 700; }
  .day-cell.no-data { opacity: 0.35; }
  .day-cell.weekend .day-num { color: var(--muted); }
  .day-num { font-size: 14px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
  .sector-tags { display: flex; flex-direction: column; gap: 2px; }
  .sector-tag {
    font-size: 10px; font-weight: 500; padding: 1px 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  footer {
    text-align: center; padding: 24px; color: var(--muted);
    font-size: 12px; border-top: 1px solid var(--border); margin-top: 20px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">KOREA MARKET <span>COMMAND</span></div>
  <div class="nav-month">
    <button onclick="changeMonth(-1)">&#9664;</button>
    <div class="month-label" id="month-label">2026년 3월</div>
    <button onclick="changeMonth(1)">&#9654;</button>
  </div>
  <div class="last-updated">마지막 업데이트: 2026-03-11 23:05</div>
</header>

<div class="calendar-wrap">
  <div class="weekday-header">
    <div>월</div><div>화</div><div>수</div><div>목</div>
    <div>금</div><div>토</div><div>일</div>
  </div>
  <div class="calendar-grid" id="calendar-grid"></div>
</div>

<footer>Korea Market Command &middot; pykrx + Claude AI &middot; 장 마감 후 업데이트</footer>

<script>
const DATA = {"2026-03-11": {"sectors": [{"name": "금융·은행", "color": "#93C5FD"}, {"name": "유통·소비재", "color": "#A3E635"}, {"name": "조선", "color": "#A78BFA"}, {"name": "철강·소재", "color": "#FB923C"}, {"name": "건설·부동산", "color": "#C084FC"}], "url": "2026-03-11.html"}};

let currentYear = 2026;
let currentMonth = 3;

function renderCalendar(year, month) {
  document.getElementById("month-label").textContent = year + "년 " + month + "월";
  const grid = document.getElementById("calendar-grid");
  grid.innerHTML = "";

  const firstDay = new Date(year, month - 1, 1).getDay();
  const offset = firstDay === 0 ? 6 : firstDay - 1; // 월요일 시작
  const daysInMonth = new Date(year, month, 0).getDate();
  const today = new Date().toISOString().slice(0, 10);

  for (let i = 0; i < offset; i++) {
    const empty = document.createElement("div");
    empty.className = "day-cell empty";
    grid.appendChild(empty);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const mm = String(month).padStart(2, "0");
    const dd = String(d).padStart(2, "0");
    const dateStr = year + "-" + mm + "-" + dd;
    const dayOfWeek = new Date(year, month - 1, d).getDay();
    const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
    const info = DATA[dateStr];
    const isToday = dateStr === today;

    const cell = document.createElement("div");
    let cls = "day-cell";
    if (isWeekend) cls += " weekend";
    if (isToday) cls += " today";
    if (info) {
      cls += " has-data";
      cell.onclick = function() { location.href = info.url; };
    } else {
      cls += " no-data";
    }
    cell.className = cls;

    const numDiv = document.createElement("div");
    numDiv.className = "day-num";
    numDiv.textContent = d;
    cell.appendChild(numDiv);

    if (info && info.sectors) {
      const tagsDiv = document.createElement("div");
      tagsDiv.className = "sector-tags";
      info.sectors.slice(0, 5).forEach(function(s) {
        const tag = document.createElement("div");
        tag.className = "sector-tag";
        tag.style.color = s.color;
        tag.textContent = s.name;
        tagsDiv.appendChild(tag);
      });
      cell.appendChild(tagsDiv);
    }

    grid.appendChild(cell);
  }
}

function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth > 12) { currentMonth = 1; currentYear++; }
  if (currentMonth < 1) { currentMonth = 12; currentYear--; }
  renderCalendar(currentYear, currentMonth);
}

renderCalendar(currentYear, currentMonth);
</script>

</body>
</html>
